<?xml version="1.0" encoding="UTF-8"?>
<!--
  IconRefresh — 刷新图标
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="refreshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>

  <!-- 主圆环（C 形，开口在右上）-->
  <path d="M 800 320 A 320 320 0 1 0 820 580" stroke="url(#refreshGrad)" stroke-width="80" fill="none" stroke-linecap="round"/>

  <!-- 箭头（右上指向）-->
  <path d="M 750 250 L 850 350 L 700 380 Z" fill="url(#refreshGrad)" stroke="#E65100" stroke-width="8" stroke-linejoin="round"/>

  <!-- 中心装饰 -->
  <circle cx="512" cy="512" r="50" fill="#FFE0B2" opacity="0.5"/>
</svg>