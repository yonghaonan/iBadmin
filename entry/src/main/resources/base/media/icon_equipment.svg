<?xml version="1.0" encoding="UTF-8"?>
<!--
  IconEquipment — 装备包图标
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>

  <!-- 装备包主体 -->
  <g transform="translate(512, 600)">
    <!-- 把手（顶部）-->
    <path d="M -100 -180 Q -100 -240 -50 -240 L 50 -240 Q 100 -240 100 -180" stroke="#E65100" stroke-width="20" fill="none" stroke-linecap="round"/>

    <!-- 包身 -->
    <path d="M -250 -150 L 250 -150 L 280 200 Q 280 250 230 250 L -230 250 Q -280 250 -280 200 Z" fill="url(#bagGrad)" stroke="#E65100" stroke-width="10"/>

    <!-- 包身装饰条 -->
    <rect x="-260" y="-50" width="520" height="30" fill="#E65100" opacity="0.6"/>
    <rect x="-260" y="80" width="520" height="30" fill="#E65100" opacity="0.6"/>

    <!-- 拉链装饰 -->
    <line x1="-220" y1="-30" x2="220" y2="-30" stroke="#FFFFFF" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="-30" r="12" fill="#FFFFFF"/>

    <!-- 球拍标志（包左侧伸出）-->
    <g transform="translate(-280, -250) rotate(-20)">
      <ellipse cx="0" cy="0" rx="60" ry="80" fill="none" stroke="#E65100" stroke-width="14"/>
      <line x1="0" y1="60" x2="0" y2="180" stroke="#E65100" stroke-width="14" stroke-linecap="round"/>
    </g>
    <!-- 球拍标志（包右侧伸出）-->
    <g transform="translate(280, -250) rotate(20)">
      <ellipse cx="0" cy="0" rx="60" ry="80" fill="none" stroke="#E65100" stroke-width="14"/>
      <line x1="0" y1="60" x2="0" y2="180" stroke="#E65100" stroke-width="14" stroke-linecap="round"/>
    </g>

    <!-- Logo 标签 -->
    <rect x="-60" y="50" width="120" height="80" rx="10" fill="#FFFFFF" stroke="#E65100" stroke-width="4"/>
    <text x="0" y="100" font-family="Arial" font-size="40" fill="#FF8C00" text-anchor="middle" font-weight="bold">iBadmin</text>
  </g>
</svg>