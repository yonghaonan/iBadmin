<?xml version="1.0" encoding="UTF-8"?>
<!--
  AppIcon Background — v1.1.3 新设计
  1024x1024 SVG 背景：橙色渐渐变 + 动感速度线
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="speedLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- 背景渐变 -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- 顶部左侧装饰圆（高光）-->
  <circle cx="180" cy="180" r="200" fill="#FFFFFF" opacity="0.15"/>

  <!-- 底部右侧装饰圆 -->
  <circle cx="900" cy="900" r="280" fill="#E65100" opacity="0.4"/>

  <!-- 动感速度线（对角线，从左上到右下）-->
  <path d="M -50 250 L 600 100" stroke="url(#speedLineGrad)" stroke-width="6" fill="none"/>
  <path d="M -50 350 L 700 150" stroke="url(#speedLineGrad)" stroke-width="5" fill="none"/>
  <path d="M -50 450 L 750 200" stroke="url(#speedLineGrad)" stroke-width="4" fill="none"/>
  <path d="M 300 1100 L 1100 600" stroke="url(#speedLineGrad)" stroke-width="6" fill="none"/>
  <path d="M 400 1100 L 1100 700" stroke="url(#speedLineGrad)" stroke-width="5" fill="none"/>
  <path d="M 500 1100 L 1100 800" stroke="url(#speedLineGrad)" stroke-width="4" fill="none"/>

  <!-- 光晕（中央）-->
  <circle cx="512" cy="512" r="380" fill="#FFFFFF" opacity="0.12"/>
</svg>